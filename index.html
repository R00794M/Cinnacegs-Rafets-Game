<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinnamon Rafets Game</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Comic Sans MS", cursive, sans-serif;
  background: linear-gradient(135deg, #cdeffd, #ffffff);
}

.container {
  background: white;
  padding: 40px;
  border-radius: 30px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.15);
  text-align: center;
  width: 90%;
  max-width: 350px;
}

h2 {
  color: #5ec6f3;
  margin-bottom: 10px;
}

input {
  padding: 12px;
  width: 100%;
  margin-top: 15px;
  border-radius: 15px;
  border: 2px solid #a8e6ff;
  text-align: center;
  font-size: 16px;
}

button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 15px;
  background-color: #7ed6f7;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background-color: #5ec6f3;
}

.error {
  color: #ff7b9c;
  margin-top: 10px;
  font-weight: bold;
  min-height: 20px;
}

@keyframes brilhar {
  from { transform: scale(1); }
  to { transform: scale(1.08); }
}

.ganhou h1 {
  color: #5ec6f3;
  animation: brilhar 1s infinite alternate;
}
</style>
</head>

<body>

<div class="container" id="login">
  <h2>☁Digite a senha secreta☁</h2>
  <input type="password" id="senha" placeholder="Senha aqui">
  <button onclick="verificarSenha()">Entrar</button>
  <p class="error" id="mensagemErro"></p>
</div>

<script>
function verificarSenha() {
  const senhaCorreta = "04CINNAMON";
  const campo = document.getElementById("senha");
  const erro = document.getElementById("mensagemErro");

  if (campo.value === senhaCorreta) {
    document.body.innerHTML = `
      <div class="container ganhou">
        <h1>VOCÊ GANHOU!!</h1>
        <p>Você descobriu a senha secreta da Cinnamon ☁️💙
        me informe IMEDIATAMENTE no wpp</p>
      </div>
    `;
  } else {
    erro.textContent = "Senha incorreta! Tente novamente!";
    campo.value = "";
    campo.focus();
  }
}
</script>

</body>
</html>
